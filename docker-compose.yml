version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: inteliment-web:latest
    container_name: inteliment-web
    ports:
      - '80:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Development service (hot-reload, no build)
  dev:
    image: node:18-alpine
    container_name: inteliment-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
